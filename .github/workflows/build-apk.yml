name: Build Navis Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by modern Android Gradle) ────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node.js for Cordova CLI ────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 4. Install Cordova ────────────────────────────────────────
      - name: Install Cordova
        run: npm install -g cordova@12

      # ── 5. Create fresh Cordova project ───────────────────────────
      - name: Create Cordova project
        run: |
          cordova create navis_build com.robomanthan.navis Navis
          # Replace generated config.xml with ours
          cp config.xml navis_build/config.xml

      # ── 6. Copy app source files into www/ ────────────────────────
      - name: Copy app files to www
        run: |
          cp index.html app.js style.css connection.css manifest.json sw.js navis_build/www/
          mkdir -p navis_build/www/images
          cp images/* navis_build/www/images/

      # ── 7. Add Android platform ───────────────────────────────────
      - name: Add Android platform
        working-directory: navis_build
        run: cordova platform add android@12.0.1

      # ── 8. Build debug APK ────────────────────────────────────────
      - name: Build Android APK
        working-directory: navis_build
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: cordova build android --debug

      # ── 9. Upload APK as downloadable artifact ────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Navis-Android-APK
          path: navis_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
