name: Build Navis Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node 20 LTS ────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Find Android SDK (pre-installed on ubuntu-latest) ──────
      - name: Set ANDROID_HOME
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools" >> $GITHUB_PATH

      # ── 5. Accept Android SDK licenses ────────────────────────────
      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 6. Install build tools + platform ─────────────────────────
      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # ── 7. Install Cordova ────────────────────────────────────────
      - name: Install Cordova CLI
        run: npm install -g cordova@12.0.0

      # ── 8. Create Cordova project ─────────────────────────────────
      - name: Create Cordova project
        run: cordova create navis_build com.robomanthan.navis Navis

      # ── 9. Copy config.xml ────────────────────────────────────────
      - name: Copy config.xml
        run: cp config.xml navis_build/config.xml

      # ── 10. Copy app source into www/ ─────────────────────────────
      - name: Copy app files
        run: |
          cp index.html app.js style.css connection.css manifest.json sw.js navis_build/www/
          mkdir -p navis_build/www/images
          cp images/* navis_build/www/images/

      # ── 11. Add Android platform ──────────────────────────────────
      - name: Add Android platform
        working-directory: navis_build
        run: cordova platform add android@12.0.1 --save

      # ── 12. Build debug APK ───────────────────────────────────────
      - name: Build APK
        working-directory: navis_build
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: cordova build android --debug -- --gradleArg=--no-daemon

      # ── 13. Show APK path for debugging ───────────────────────────
      - name: Locate APK
        run: find navis_build/platforms/android -name "*.apk" 2>/dev/null

      # ── 14. Upload APK ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Navis-Android-APK
          path: navis_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
