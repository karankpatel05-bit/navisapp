apply plugin: 'com.android.application'

android {
    namespace 'com.robomanthan.navis'
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.robomanthan.navis"
        minSdkVersion 22
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
